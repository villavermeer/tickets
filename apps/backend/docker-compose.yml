# From repo root: docker compose -f apps/backend/docker-compose.yml up --build
# From this directory: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Application database (PostgreSQL). phpMyAdmin cannot connect here — use adminer below.
  adminer:
    image: adminer:4
    ports:
      - "18081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://tickets:tickets@postgres:5432/tickets
      REDIS_URL: redis://redis:6379
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-docker-token-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
